name: Sync to Hugging Face
on:
  push:
    branches: [ main, master ] # Syncs when you push to main or master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git remote add hf https://Johan342:$HF_TOKEN@huggingface.co/spaces/Johan342/eyecon-backend
          git push --force hf main
